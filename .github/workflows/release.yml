name: release

# Triggered by pushing a tag like "v1.0.0" (see .claude/plans/07-phase7-docker-release.md).
# Plain `go build` (matrix over GOOS/GOARCH) + `gh release create`; no
# goreleaser, to keep this workflow easy to read end-to-end. The
# version is embedded into the binary the same way as the Dockerfile
# does, via -ldflags -X internal/cli.version.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: go vet ./...
      - run: go test ./... -count=1

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          out="dist/diagoram-${GOOS}-${GOARCH}${ext}"
          mkdir -p dist
          go build -trimpath \
            -ldflags "-s -w -X github.com/shimabox/diagoram/internal/cli.version=${GITHUB_REF_NAME}" \
            -o "$out" ./cmd/diagoram
          (cd dist && tar -c "$(basename "$out")" | gzip -9 > "$(basename "$out").tar.gz" && rm "$(basename "$out")")
          (cd dist && shasum -a 256 *.tar.gz > "diagoram-${GOOS}-${GOARCH}.sha256")

      - uses: actions/upload-artifact@v4
        with:
          name: diagoram-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
